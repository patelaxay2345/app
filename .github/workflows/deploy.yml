name: Deploy to Linode

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: jobtalk-partner-portal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:latest -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Save Docker image
        run: |
          docker save ${{ env.IMAGE_NAME }}:latest | gzip > image.tar.gz

      - name: Copy files to Linode
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "image.tar.gz,docker-compose.prod.yml"
          target: /opt/jobtalk-superadmin

      - name: Deploy on Linode
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /opt/jobtalk-superadmin

            # Load Docker image
            docker load < image.tar.gz

            # Export env vars for docker-compose
            export CI_REGISTRY_IMAGE=${{ env.IMAGE_NAME }}
            export IMAGE_TAG=latest
            export MONGO_URL="${{ secrets.MONGO_URL }}"
            export DB_NAME="${{ secrets.DB_NAME }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY }}"
            export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            export AWS_REGION="${{ secrets.AWS_REGION }}"
            export SMTP_HOST="${{ secrets.SMTP_HOST }}"
            export SMTP_PORT="${{ secrets.SMTP_PORT }}"
            export SMTP_USERNAME="${{ secrets.SMTP_USERNAME }}"
            export SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}"
            export SMTP_FROM_EMAIL="${{ secrets.SMTP_FROM_EMAIL }}"
            export OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}"
            export CORS_ORIGINS="https://superadmin.jobtalk.ai"

            # Start/update the app container
            docker compose -f docker-compose.prod.yml up -d --force-recreate

            # Verify health
            sleep 15
            curl -f http://localhost:8001/health || echo "Health check pending..."

            # Cleanup
            rm -f image.tar.gz
            docker image prune -f
